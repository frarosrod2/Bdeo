<div class="page-container">
  <div class="page-header">
    <h1 class="mat-headline-5">Claims</h1>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      New Claim
    </button>
  </div>

  @if (loading()) {
    <div class="spinner-wrapper">
      <mat-spinner diameter="48" />
    </div>
  } @else if (claims().length === 0) {
    <div class="empty-state">
      <mat-icon class="empty-icon">folder_open</mat-icon>
      <p>No claims yet. Create the first one.</p>
    </div>
  } @else {
    <table mat-table [dataSource]="claims()" class="mat-elevation-z2 claims-table">

      <!-- Title -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let row">{{ row.title }}</td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip [color]="statusColor(row.status)" highlighted>
            {{ statusLabel(row.status) }}
          </mat-chip>
        </td>
      </ng-container>

      <!-- Total Amount -->
      <ng-container matColumnDef="totalAmount">
        <th mat-header-cell *matHeaderCellDef class="align-right">Total</th>
        <td mat-cell *matCellDef="let row" class="align-right">
          {{ row.totalAmount | currency: 'EUR' }}
        </td>
      </ng-container>

      <!-- Created At -->
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let row">{{ row.createdAt | date: 'dd/MM/yyyy' }}</td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          <button mat-icon-button matTooltip="View detail" (click)="openDetail(row.id)">
            <mat-icon>chevron_right</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            matTooltip="Delete claim"
            (click)="deleteClaim(row.id, $event)"
          >
            <mat-icon>delete_outline</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        class="clickable-row"
        (click)="openDetail(row.id)"
      ></tr>
    </table>
  }
</div>
